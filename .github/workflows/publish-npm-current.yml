name: Publish current version to npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only (no upload)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint

      - name: Show version
        run: node -p "require('./package.json').version"

      - name: Publish to npm (dry run)
        if: ${{ inputs.dry_run }}
        run: pnpm publish --dry-run --access public --no-git-checks

      - name: Publish to npm
        if: ${{ !inputs.dry_run }}
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
